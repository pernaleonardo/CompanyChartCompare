<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company Chart – Login</title>
  <meta name="description" content="Login to the SedApta Company Chart management frontend." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="login-bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="login-card" role="main">

    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-icon" aria-hidden="true">🏢</div>
      <div>
        <h1>Company Chart</h1>
        <span>Configuration Management</span>
      </div>
    </div>

    <p class="login-title">Accedi al sistema</p>
    <p class="login-subtitle">Inserisci i parametri di connessione per continuare</p>

    <!-- Alert area -->
    <div id="login-alert" class="hidden" role="alert"></div>

    <form id="login-form" novalidate>
      <div class="field-group">

        <!-- Profile A Selector -->
        <div class="field" style="grid-column: span 2;">
          <label for="profile-select-A" style="display:flex; justify-content:space-between; align-items:center;">
            <span>Profilo Ambiente A</span>
            <div style="display:flex; gap:8px;">
              <span id="btn-save-profile-A" style="font-size:11px; color:var(--accent-bright); cursor:pointer;" role="button">💾 Salva Corrente</span>
              <span id="btn-delete-profile-A" style="font-size:11px; color:var(--danger); cursor:pointer;" class="hidden" role="button">🗑️ Rimuovi</span>
            </div>
          </label>
          <select id="profile-select-A" style="width:100%; background:var(--bg-base); border:1px solid var(--border); border-radius:6px; padding:8px 12px; color:#fff; font-size:13px; outline:none; cursor:pointer;">
            <option value="">— seleziona profilo —</option>
          </select>
        </div>

        <!-- App Server -->
        <div class="field">
          <label for="appServer">App Server</label>
          <input
            id="appServer"
            type="text"
            placeholder="es. ssc-test.kering.com"
            value="ssc-test.kering.com"
            autocomplete="off"
            required
          />
        </div>

        <!-- Component ID -->
        <div class="field">
          <label for="componentId">Component ID</label>
          <input
            id="componentId"
            type="text"
            placeholder="es. brk"
            value="brk"
            autocomplete="off"
            required
          />
        </div>

        <!-- Service Username -->
        <div class="field">
          <label for="serviceUsername">Service Username</label>
          <input
            id="serviceUsername"
            type="text"
            placeholder="es. SSC.DEFAULT@SERVICE"
            value="SSC.DEFAULT@SERVICE"
            autocomplete="off"
          />
        </div>

        <!-- Colore Tema A -->
        <div class="field">
          <label for="themeColor">Colore Tema</label>
          <select id="themeColor" style="background:var(--bg-base); border:1px solid var(--border); border-radius:6px; color:#fff; padding:8px 12px; outline:none; font-size:13px; cursor:pointer;">
            <option value="#3d7fff" selected>🔵 Blu (Default)</option>
            <option value="#a855f7">🟣 Viola</option>
            <option value="#10b981">🟢 Verde</option>
            <option value="#f97316">🟠 Arancione</option>
            <option value="#ef4444">🔴 Rosso</option>
          </select>
        </div>

      </div>

      <!-- Enable Environment B Checkbox -->
      <div class="checkbox-field" style="margin: 16px 0; display: flex; align-items: center; gap: 8px;">
        <input type="checkbox" id="enable-env-B" style="width: 16px; height: 16px; cursor: pointer;" />
        <label for="enable-env-B" style="cursor: pointer; font-weight: 500; font-size: 13px; color: var(--text-secondary);">Connetti secondo ambiente (per confronto multi-ambiente)</label>
      </div>

      <!-- Environment B Fields (hidden by default) -->
      <div id="env-B-fields" class="hidden" style="margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border);">
        <p class="login-subtitle" style="margin-bottom: 12px; font-weight: 600; color: var(--accent-bright);">Parametri Ambiente B (Destinazione)</p>
        <div class="field-group">

          <!-- Profile B Selector -->
          <div class="field" style="grid-column: span 2;">
            <label for="profile-select-B" style="display:flex; justify-content:space-between; align-items:center;">
              <span>Profilo Ambiente B</span>
              <div style="display:flex; gap:8px;">
                <span id="btn-save-profile-B" style="font-size:11px; color:var(--accent-bright); cursor:pointer;" role="button">💾 Salva Corrente</span>
                <span id="btn-delete-profile-B" style="font-size:11px; color:var(--danger); cursor:pointer;" class="hidden" role="button">🗑️ Rimuovi</span>
              </div>
            </label>
            <select id="profile-select-B" style="width:100%; background:var(--bg-base); border:1px solid var(--border); border-radius:6px; padding:8px 12px; color:#fff; font-size:13px; outline:none; cursor:pointer;">
              <option value="">— seleziona profilo —</option>
            </select>
          </div>

          <!-- App Server B -->
          <div class="field">
            <label for="appServerB">App Server B</label>
            <input
              id="appServerB"
              type="text"
              placeholder="es. ssc-prod.kering.com"
              autocomplete="off"
            />
          </div>

          <!-- Component ID B -->
          <div class="field">
            <label for="componentIdB">Component ID B</label>
            <input
              id="componentIdB"
              type="text"
              placeholder="es. brk"
              value="brk"
              autocomplete="off"
            />
          </div>

          <!-- Service Username B -->
          <div class="field">
            <label for="serviceUsernameB">Service Username B</label>
            <input
              id="serviceUsernameB"
              type="text"
              placeholder="es. SSC.DEFAULT@SERVICE"
              value="SSC.DEFAULT@SERVICE"
              autocomplete="off"
            />
          </div>
          
          <!-- Component Password B -->
          <div class="field">
            <label for="componentPasswordB">Component Password B</label>
            <input id="componentPasswordB" type="password" value="acm" placeholder="acm" />
          </div>

          <!-- Colore Tema B -->
          <div class="field">
            <label for="themeColorB">Colore Tema B</label>
            <select id="themeColorB" style="background:var(--bg-base); border:1px solid var(--border); border-radius:6px; color:#fff; padding:8px 12px; outline:none; font-size:13px; cursor:pointer;">
              <option value="#3d7fff">🔵 Blu</option>
              <option value="#a855f7" selected>🟣 Viola (Default)</option>
              <option value="#10b981">🟢 Verde</option>
              <option value="#f97316">🟠 Arancione</option>
              <option value="#ef4444">🔴 Rosso</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Advanced section -->
      <div class="advanced-toggle" id="advanced-toggle" role="button" tabindex="0" aria-expanded="false">
        <span class="chevron">▶</span>
        <span>Opzioni avanzate</span>
      </div>
      <div class="advanced-panel" id="advanced-panel" aria-hidden="true">
        <div class="field-group">
          <div class="field">
            <label for="componentPassword">Component Password</label>
            <input id="componentPassword" type="password" value="acm" placeholder="acm" />
          </div>
          <div class="field">
            <label for="acmDllPath">Percorso DLL ACM</label>
            <input
              id="acmDllPath"
              type="text"
              value="C:\sedApta\Shared\ACM\Client\Sedapta.ACM.Client.dll"
              placeholder="C:\sedApta\Shared\ACM\Client\Sedapta.ACM.Client.dll"
            />
          </div>
        </div>
      </div>

      <button type="submit" id="btn-login" class="btn btn-connect" aria-label="Connetti">
        <span id="btn-login-text">🔗 Connetti</span>
        <span id="btn-login-spinner" class="hidden">
          <span class="spinner" style="width:18px;height:18px;border-width:2px;"></span>
        </span>
      </button>

    </form>

    <div class="separator"></div>
    <p style="text-align:center;font-size:11px;color:var(--text-muted);">
      SedApta Company Chart Frontend &nbsp;·&nbsp; v1.0.0
    </p>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container" aria-live="polite"></div>

<script>
// ── Advanced panel toggle ──────────────────────────────────
const toggle = document.getElementById('advanced-toggle');
const panel  = document.getElementById('advanced-panel');
toggle.addEventListener('click', () => {
  const isOpen = panel.classList.toggle('open');
  toggle.classList.toggle('open', isOpen);
  toggle.setAttribute('aria-expanded', isOpen);
  panel.setAttribute('aria-hidden', !isOpen);
});
toggle.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle.click(); } });

// Toggle Environment B fields visibility
const enableEnvBCheckbox = document.getElementById('enable-env-B');
const envBFields = document.getElementById('env-B-fields');
enableEnvBCheckbox.addEventListener('change', () => {
  if (enableEnvBCheckbox.checked) {
    envBFields.classList.remove('hidden');
  } else {
    envBFields.classList.add('hidden');
  }
});

// ── Alert helper ──────────────────────────────────────────
function showAlert(msg, type = 'error') {
  const el = document.getElementById('login-alert');
  el.className = `alert alert-${type}`;
  el.textContent = msg;
  el.classList.remove('hidden');
}
function clearAlert() { document.getElementById('login-alert').classList.add('hidden'); }

// ── Form submit ───────────────────────────────────────────
document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  clearAlert();

  const appServer         = document.getElementById('appServer').value.trim();
  const componentId       = document.getElementById('componentId').value.trim();
  const serviceUsername   = document.getElementById('serviceUsername').value.trim();
  const componentPassword = document.getElementById('componentPassword').value.trim();
  const acmDllPath        = document.getElementById('acmDllPath').value.trim();
  const themeColor        = document.getElementById('themeColor').value;

  const enableEnvB        = document.getElementById('enable-env-B').checked;
  const appServerB         = document.getElementById('appServerB').value.trim();
  const componentIdB       = document.getElementById('componentIdB').value.trim();
  const serviceUsernameB   = document.getElementById('serviceUsernameB').value.trim();
  const componentPasswordB = document.getElementById('componentPasswordB').value.trim();
  const themeColorB        = document.getElementById('themeColorB').value;

  if (!appServer)  return showAlert('App Server (Ambiente A) è obbligatorio.');
  if (!componentId)return showAlert('Component ID (Ambiente A) è obbligatorio.');

  if (enableEnvB) {
    if (!appServerB)  return showAlert('App Server B (Ambiente B) è obbligatorio.');
    if (!componentIdB)return showAlert('Component ID B (Ambiente B) è obbligatorio.');
  }

  const btn        = document.getElementById('btn-login');
  const btnText    = document.getElementById('btn-login-text');
  const btnSpinner = document.getElementById('btn-login-spinner');
  btn.disabled     = true;
  btnText.classList.add('hidden');
  btnSpinner.classList.remove('hidden');

  try {
    // 1. Authenticate Environment A
    const respA = await fetch('/api/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ appServer, componentId, serviceUsername, componentPassword, acmDllPath }),
    });

    const dataA = await respA.json();

    if (!respA.ok || !dataA.success) {
      throw new Error('Ambiente A: ' + (dataA.error || 'Autenticazione fallita.'));
    }

    let dataB = null;
    if (enableEnvB) {
      // 2. Authenticate Environment B
      const respB = await fetch('/api/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          appServer: appServerB,
          componentId: componentIdB,
          serviceUsername: serviceUsernameB,
          componentPassword: componentPasswordB,
          acmDllPath
        }),
      });

      dataB = await respB.json();

      if (!respB.ok || !dataB.success) {
        throw new Error('Ambiente B: ' + (dataB.error || 'Autenticazione fallita.'));
      }
    }

    // Persist all session info in sessionStorage
    sessionStorage.clear();

    // Store Environment A
    sessionStorage.setItem('cc_token_A',       dataA.token);
    sessionStorage.setItem('cc_appServer_A',   dataA.appServer);
    sessionStorage.setItem('cc_componentId_A', dataA.componentId);
    sessionStorage.setItem('cc_username_A',    serviceUsername);
    sessionStorage.setItem('cc_themeColor_A',  themeColor);

    // Fallbacks
    sessionStorage.setItem('cc_token',       dataA.token);
    sessionStorage.setItem('cc_appServer',   dataA.appServer);
    sessionStorage.setItem('cc_componentId', dataA.componentId);
    sessionStorage.setItem('cc_username',    serviceUsername);
    sessionStorage.setItem('cc_themeColor',  themeColor);

    if (enableEnvB && dataB) {
      // Store Environment B
      sessionStorage.setItem('cc_token_B',       dataB.token);
      sessionStorage.setItem('cc_appServer_B',   dataB.appServer);
      sessionStorage.setItem('cc_componentId_B', dataB.componentId);
      sessionStorage.setItem('cc_username_B',    serviceUsernameB);
      sessionStorage.setItem('cc_themeColor_B',  themeColorB);
      sessionStorage.setItem('cc_multiEnv',      'true');
    } else {
      sessionStorage.setItem('cc_multiEnv',      'false');
    }

    // Redirect to main app
    window.location.href = 'app.html';

  } catch (err) {
    showAlert(err.message || 'Errore di connessione. Verifica i parametri.');
  } finally {
    btn.disabled = false;
    btnText.classList.remove('hidden');
    btnSpinner.classList.add('hidden');
  }
});

// ── Connection profiles management ────────────────────────
let connectionProfiles = {};

function loadProfiles() {
  try {
    const stored = localStorage.getItem('cc_connection_profiles');
    connectionProfiles = stored ? JSON.parse(stored) : {};
  } catch (_) {
    connectionProfiles = {};
  }
}

function saveProfiles() {
  try {
    localStorage.setItem('cc_connection_profiles', JSON.stringify(connectionProfiles));
  } catch (_) {}
}

function populateProfileDropdowns() {
  loadProfiles();
  const selectA = document.getElementById('profile-select-A');
  const selectB = document.getElementById('profile-select-B');

  const aliases = Object.keys(connectionProfiles).sort();
  const optionsHTML = [
    '<option value="">— seleziona profilo —</option>',
    ...aliases.map(a => `<option value="${a}">${a}</option>`)
  ].join('');

  if (selectA) selectA.innerHTML = optionsHTML;
  if (selectB) selectB.innerHTML = optionsHTML;
}

function applyProfileSelection(side, alias) {
  const btnDelete = document.getElementById(`btn-delete-profile-${side}`);
  if (!alias) {
    if (btnDelete) btnDelete.classList.add('hidden');
    return;
  }

  const profile = connectionProfiles[alias];
  if (!profile) return;

  if (side === 'A') {
    document.getElementById('appServer').value = profile.appServer || '';
    document.getElementById('componentId').value = profile.componentId || '';
    document.getElementById('serviceUsername').value = profile.username || '';
    document.getElementById('componentPassword').value = profile.password || 'acm';
    document.getElementById('themeColor').value = profile.themeColor || '#3d7fff';
  } else {
    document.getElementById('appServerB').value = profile.appServer || '';
    document.getElementById('componentIdB').value = profile.componentId || '';
    document.getElementById('serviceUsernameB').value = profile.username || '';
    document.getElementById('componentPasswordB').value = profile.password || 'acm';
    document.getElementById('themeColorB').value = profile.themeColor || '#a855f7';
  }

  if (btnDelete) btnDelete.classList.remove('hidden');
}

function saveCurrentAsProfile(side) {
  const alias = prompt('Inserisci un alias per questo profilo (es. DEV, UAT):');
  if (!alias) return;

  const name = alias.trim();
  if (!name) return;

  let profile = {};
  if (side === 'A') {
    profile = {
      appServer: document.getElementById('appServer').value.trim(),
      componentId: document.getElementById('componentId').value.trim(),
      username: document.getElementById('serviceUsername').value.trim(),
      password: document.getElementById('componentPassword').value.trim(),
      themeColor: document.getElementById('themeColor').value
    };
  } else {
    profile = {
      appServer: document.getElementById('appServerB').value.trim(),
      componentId: document.getElementById('componentIdB').value.trim(),
      username: document.getElementById('serviceUsernameB').value.trim(),
      password: document.getElementById('componentPasswordB').value.trim(),
      themeColor: document.getElementById('themeColorB').value
    };
  }

  if (!profile.appServer || !profile.componentId) {
    alert('Compila almeno App Server e Component ID prima di salvare.');
    return;
  }

  connectionProfiles[name] = profile;
  saveProfiles();
  populateProfileDropdowns();
  
  // Set the select element value to the newly saved profile
  document.getElementById(`profile-select-${side}`).value = name;
  document.getElementById(`btn-delete-profile-${side}`).classList.remove('hidden');
}

function deleteProfile(side) {
  const select = document.getElementById(`profile-select-${side}`);
  const alias = select.value;
  if (!alias) return;

  if (confirm(`Sei sicuro di voler rimuovere il profilo "${alias}"?`)) {
    delete connectionProfiles[alias];
    saveProfiles();
    populateProfileDropdowns();
    document.getElementById(`btn-delete-profile-${side}`).classList.add('hidden');
  }
}

// Bind profile events
document.addEventListener('DOMContentLoaded', () => {
  populateProfileDropdowns();

  const selectA = document.getElementById('profile-select-A');
  const selectB = document.getElementById('profile-select-B');
  const btnSaveA = document.getElementById('btn-save-profile-A');
  const btnSaveB = document.getElementById('btn-save-profile-B');
  const btnDelA = document.getElementById('btn-delete-profile-A');
  const btnDelB = document.getElementById('btn-delete-profile-B');

  if (selectA) selectA.addEventListener('change', e => applyProfileSelection('A', e.target.value));
  if (selectB) selectB.addEventListener('change', e => applyProfileSelection('B', e.target.value));

  if (btnSaveA) btnSaveA.addEventListener('click', () => saveCurrentAsProfile('A'));
  if (btnSaveB) btnSaveB.addEventListener('click', () => saveCurrentAsProfile('B'));

  if (btnDelA) btnDelA.addEventListener('click', () => deleteProfile('A'));
  if (btnDelB) btnDelB.addEventListener('click', () => deleteProfile('B'));
});

// ── Auto-redirect if already logged in ───────────────────
if (sessionStorage.getItem('cc_token') || sessionStorage.getItem('cc_token_A')) {
  window.location.href = 'app.html';
}
</script>
</body>
</html>
